basePath: /api/v1
definitions:
  domain.Bucket:
    properties:
      bucketKey:
        type: string
      bucketOwner:
        type: string
      createdDate:
        type: integer
      permissions:
        items:
          $ref: '#/definitions/domain.Permission'
        type: array
      policyKey:
        type: string
    type: object
  domain.Permission:
    properties:
      access:
        type: string
      authId:
        type: string
    type: object
  handler.BucketResponse:
    properties:
      created_date:
        type: string
      name:
        type: string
      policy_key:
        type: string
    type: object
  handler.TokenResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      token_type:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for APS Viewer application
  title: Nextgo APS Viewer API
  version: "1.0"
paths:
  /auth/token:
    get:
      consumes:
      - application/json
      description: APS サービス用の認証トークンを取得
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.TokenResponse'
      summary: トークン取得
      tags:
      - 認証
  /buckets:
    get:
      description: バケット一覧を取得
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Bucket'
            type: array
      summary: バケット一覧取得
      tags:
      - バケット
    post:
      consumes:
      - application/json
      description: 新規バケットを作成
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.BucketResponse'
      summary: バケット作成
      tags:
      - バケット
swagger: "2.0"
